<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body>
<div>
    <h1>Cadastro</h1>
    
    <form id="formCadastro">    
        Nome: <input type="text" name="nome" required>
        <br><br>
        Email: <input type="email" name="email" required>
        <br><br>
        Senha: <input type="password" name="senha" required>
        <br><br>
        <input type="submit" value="Cadastrar">
    </form>
    
    <p id="mensagem" style="font-weight: bold;"></p>
    
    <p><a href="login.html">Voltar ao Login</a></p>
</div>

<script>
    document.getElementById('formCadastro').addEventListener('submit', function(event) {
        
        event.preventDefault(); 

        const formData = new FormData(this);
        const msgElement = document.getElementById('mensagem');
        
        
        msgElement.style.color = '#333';
        msgElement.textContent = 'Processando...';

       
        fetch('api_cadastro.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json()) // Lê a resposta em JSON
        .then(data => {
            if(data.sucesso) {
                
                msgElement.style.color = 'green';
                msgElement.textContent = data.mensagem;
                document.getElementById('formCadastro').reset(); // Limpa os campos após o cadastro
            } else {
                
                msgElement.style.color = 'red';
                msgElement.textContent = data.mensagem;
            }
        })
        .catch(error => {
            console.error('Erro na requisição:', error);
            msgElement.style.color = 'red';
            msgElement.textContent = "Erro ao tentar realizar o cadastro.";
        });
    });
</script>
</body>
</html>
